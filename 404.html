<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 80px;
      margin: 0;
    }

    p {
      font-size: 18px;
      margin: 20px 0;
      opacity: 0.7;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    a:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>The page you are looking for doesn’t exist.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
